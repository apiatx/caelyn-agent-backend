<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Watch — Caelyn AI</title>
<style>
  :root {
    --bg: #090909; --bg2: #0f0f0f; --bg3: #161616; --bg4: #1c1c1c;
    --border: #2a2a2a; --border2: #333;
    --green: #00e676; --green-dim: #1b3a25;
    --yellow: #ffd600; --yellow-dim: #3e2c00;
    --red: #ff1744; --red-dim: #4a0010;
    --blue: #2979ff; --blue-dim: #0d2a6e;
    --purple: #aa00ff; --purple-dim: #2a0045;
    --orange: #ff6d00;
    --text: #e0e0e0; --text-dim: #888; --text-dimmer: #555;
    --mono: 'Courier New','Consolas',monospace;
    --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: #0a0a0a; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .topbar-title { font-size: 14px; font-weight: bold; color: var(--text); letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-btn {
    padding: 4px 12px; background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 11px; cursor: pointer;
    border-radius: 3px; letter-spacing: 0.5px; transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--bg4); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .last-updated { font-size: 11px; color: var(--text-dim); }

  /* MAIN */
  .main { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* HEADER ROW */
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 8px 0; border-bottom: 1px solid var(--border);
  }
  .header-title { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .header-meta { font-size: 11px; color: var(--text-dimmer); }

  /* LEADERBOARD */
  .leaderboard {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .lb-head {
    display: grid;
    grid-template-columns: 32px 1fr 90px 90px 90px 90px 120px;
    padding: 7px 14px; background: var(--bg3); border-bottom: 1px solid var(--border);
    font-size: 10px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 32px 1fr 90px 90px 90px 90px 120px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    align-items: center; cursor: pointer; transition: background 0.12s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--bg3); }
  .lb-rank { font-size: 11px; color: var(--text-dimmer); font-weight: bold; }
  .lb-name-col { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .lb-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-subtitle { font-size: 10px; color: var(--text-dimmer); margin-top: 2px; }
  .new-buys-badge {
    background: var(--orange); color: #000; font-size: 9px; font-weight: bold;
    padding: 1px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  }
  .ret-val { font-size: 13px; font-weight: bold; text-align: right; }
  .ret-val.pos { color: var(--green); }
  .ret-val.neg { color: var(--red); }
  .ret-val.neutral { color: var(--text-dim); }
  .lb-actions { display: flex; justify-content: flex-end; gap: 6px; }
  .detail-btn {
    padding: 3px 10px; background: var(--bg4); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 10px; cursor: pointer;
    border-radius: 3px; transition: background 0.12s;
  }
  .detail-btn:hover { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

  /* LOADING/EMPTY */
  .loading-state {
    padding: 40px; text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 1px;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2);
    border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px;
    width: min(860px, 96vw); max-height: 88vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .modal-title { font-size: 14px; font-weight: bold; color: var(--text); }
  .modal-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .modal-close {
    background: none; border: none; color: var(--text-dim); font-size: 18px;
    cursor: pointer; line-height: 1; padding: 0 4px; flex-shrink: 0;
  }
  .modal-close:hover { color: var(--text); }

  /* RETURNS STRIP */
  .returns-strip {
    display: flex; gap: 20px; padding: 10px 18px; background: var(--bg3);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .ret-item { display: flex; flex-direction: column; gap: 2px; }
  .ret-label { font-size: 9px; color: var(--text-dimmer); letter-spacing: 1px; text-transform: uppercase; }
  .ret-number { font-size: 15px; font-weight: bold; }
  .ret-number.pos { color: var(--green); }
  .ret-number.neg { color: var(--red); }
  .ret-number.neutral { color: var(--text-dim); }
  .ret-vs { font-size: 9px; color: var(--text-dimmer); margin-top: 1px; }

  /* TABS */
  .tab-bar {
    display: flex; border-bottom: 1px solid var(--border); padding: 0 18px; background: var(--bg3);
  }
  .tab {
    padding: 9px 14px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px;
    cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent;
    transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .tab-content { flex: 1; overflow-y: auto; padding: 0; }

  /* HOLDINGS TABLE */
  .holdings-table { width: 100%; border-collapse: collapse; }
  .holdings-table th {
    position: sticky; top: 0; background: var(--bg3);
    padding: 8px 14px; font-size: 10px; letter-spacing: 1px; color: var(--text-dim);
    text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); font-weight: normal;
  }
  .holdings-table th.right { text-align: right; }
  .holdings-table td { padding: 9px 14px; font-size: 12px; border-bottom: 1px solid var(--border); }
  .holdings-table tr:last-child td { border-bottom: none; }
  .holdings-table tr:hover td { background: var(--bg3); }
  .td-ticker { font-weight: bold; color: var(--blue); font-size: 13px; }
  .td-right { text-align: right; }
  .weight-bar {
    display: flex; align-items: center; gap: 8px;
  }
  .weight-track {
    flex: 1; height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; min-width: 60px;
  }
  .weight-fill { height: 100%; background: var(--blue); border-radius: 2px; }
  .weight-text { font-size: 12px; text-align: right; min-width: 42px; color: var(--text); }

  /* TRANSACTIONS TABLE */
  .tx-type-new {
    background: var(--green-dim); color: var(--green); font-size: 10px; font-weight: bold;
    padding: 2px 7px; border-radius: 10px; letter-spacing: 0.5px;
  }
  .tx-type-added {
    background: var(--blue-dim); color: var(--blue); font-size: 10px; font-weight: bold;
    padding: 2px 7px; border-radius: 10px; letter-spacing: 0.5px;
  }

  /* RETURNS TAB */
  .returns-tab-content { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .returns-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 16px; display: flex; flex-direction: column; gap: 4px;
  }
  .returns-card-quarter { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .returns-card-row { display: flex; justify-content: space-between; align-items: center; }
  .returns-card-val { font-size: 18px; font-weight: bold; }
  .returns-card-spy { font-size: 11px; color: var(--text-dimmer); }
  .returns-card-portfolio-val { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* THEME TAB */
  .theme-content { padding: 24px 20px; }
  .theme-text { font-family: var(--sans); font-size: 14px; line-height: 1.7; color: var(--text); }
  .theme-placeholder { color: var(--text-dimmer); font-size: 12px; }

  /* EMPTY */
  .empty-state { padding: 32px; text-align: center; color: var(--text-dimmer); font-size: 12px; }

  /* FOOTER */
  .footer { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-dimmer); text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Caelyn AI</span>
    <span class="topbar-title">WHALE WATCH</span>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span class="last-updated" id="lastUpdated">Loading…</span>
    <button class="refresh-btn" id="refreshBtn" onclick="triggerRefresh()">↺ Refresh All</button>
    <button class="refresh-btn" onclick="loadWhales()">⟳ Reload</button>
  </div>
</div>

<div class="main">
  <div class="header-row">
    <span class="header-title">Institutional 13F Leaderboard — Sorted by 3-Month Return</span>
    <span class="header-meta" id="whaleCount">—</span>
  </div>

  <div class="leaderboard" id="leaderboard">
    <div class="loading-state"><span class="spinner"></span>Loading whale data…</div>
  </div>
</div>

<div class="footer">
  SEC 13F filings · EDGAR data · Returns via Tradier · Powered by Caelyn AI
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div class="modal-subtitle" id="modalSubtitle">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="returns-strip" id="returnsStrip"></div>

    <div class="tab-bar">
      <button class="tab active" id="tab-holdings" onclick="switchTab('holdings')">Holdings</button>
      <button class="tab" id="tab-new-buys" onclick="switchTab('new-buys')">New Buys <span id="newBuysBadge"></span></button>
      <button class="tab" id="tab-returns" onclick="switchTab('returns')">Returns History</button>
      <button class="tab" id="tab-theme" onclick="switchTab('theme')">AI Theme</button>
    </div>

    <div class="tab-content" id="tabContent">
      <div class="loading-state"><span class="spinner"></span>Loading…</div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let whales = [];
let newBuysCounts = {};
let currentWhaleName = null;
let currentTab = 'holdings';

async function loadWhales() {
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '<div class="loading-state"><span class="spinner"></span>Loading whale data…</div>';
  try {
    const res = await fetch(`${API}/whales`);
    const data = await res.json();
    whales = data.sort((a, b) => (b.return_3m ?? -9999) - (a.return_3m ?? -9999));
    document.getElementById('whaleCount').textContent = `${whales.length} tracked institutions`;
    await loadNewBuysCounts();
    renderLeaderboard();
    updateLastUpdated();
  } catch(e) {
    lb.innerHTML = `<div class="loading-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function loadNewBuysCounts() {
  newBuysCounts = {};
  await Promise.allSettled(whales.map(async w => {
    try {
      const res = await fetch(`${API}/whales/${encodeURIComponent(w.name)}/new-buys`);
      const d = await res.json();
      newBuysCounts[w.name] = d.count || 0;
    } catch { newBuysCounts[w.name] = 0; }
  }));
}

function fmtRet(val) {
  if (val == null) return { text: '—', cls: 'neutral' };
  const sign = val >= 0 ? '+' : '';
  return { text: `${sign}${val.toFixed(1)}%`, cls: val > 0 ? 'pos' : val < 0 ? 'neg' : 'neutral' };
}

function fmtVal(v) {
  if (!v) return '—';
  if (v >= 1e9) return `$${(v/1e9).toFixed(1)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`;
  return `$${v.toLocaleString()}`;
}

function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  if (!whales.length) {
    lb.innerHTML = '<div class="loading-state">No whales found. Try refreshing.</div>';
    return;
  }
  let html = `<div class="lb-head">
    <div>#</div><div>Fund</div>
    <div style="text-align:right">1M</div>
    <div style="text-align:right">3M</div>
    <div style="text-align:right">6M</div>
    <div style="text-align:right">1Y</div>
    <div style="text-align:right">Actions</div>
  </div>`;
  whales.forEach((w, i) => {
    const r1 = fmtRet(w.return_1m), r3 = fmtRet(w.return_3m);
    const r6 = fmtRet(w.return_6m), r1y = fmtRet(w.return_1y);
    const nb = newBuysCounts[w.name] || 0;
    const badge = nb > 0 ? `<span class="new-buys-badge">🔥 ${nb} new</span>` : '';
    const esc = encodeURIComponent(w.name);
    html += `<div class="lb-row" onclick="openModal('${w.name.replace(/'/g,"\\'")}')">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-name-col">
        <div>
          <div class="lb-name">${w.name} ${badge}</div>
          <div class="lb-subtitle">${(w.description||'').substring(0,80)}${(w.description||'').length>80?'…':''}</div>
        </div>
      </div>
      <div class="ret-val ${r1.cls}">${r1.text}</div>
      <div class="ret-val ${r3.cls}">${r3.text}</div>
      <div class="ret-val ${r6.cls}">${r6.text}</div>
      <div class="ret-val ${r1y.cls}">${r1y.text}</div>
      <div class="lb-actions">
        <button class="detail-btn" onclick="event.stopPropagation();openModal('${w.name.replace(/'/g,"\\'")}')">View →</button>
      </div>
    </div>`;
  });
  lb.innerHTML = html;
}

function updateLastUpdated() {
  const latest = whales.map(w => w.last_updated).filter(Boolean).sort().reverse()[0];
  document.getElementById('lastUpdated').textContent = latest
    ? `Updated ${new Date(latest).toLocaleString()}`
    : 'No timestamp';
}

async function openModal(whaleName) {
  currentWhaleName = whaleName;
  currentTab = 'holdings';
  const whale = whales.find(w => w.name === whaleName) || {};
  document.getElementById('modalTitle').textContent = whaleName;
  document.getElementById('modalSubtitle').textContent = whale.description || '';
  renderReturnsStrip(whale);
  document.getElementById('modalOverlay').classList.add('open');
  switchTab('holdings');
}

function renderReturnsStrip(whale) {
  const strip = document.getElementById('returnsStrip');
  const periods = [
    ['1M Return', whale.return_1m],
    ['3M Return', whale.return_3m],
    ['6M Return', whale.return_6m],
    ['1Y Return', whale.return_1y],
  ];
  strip.innerHTML = periods.map(([label, val]) => {
    const { text, cls } = fmtRet(val);
    return `<div class="ret-item">
      <span class="ret-label">${label}</span>
      <span class="ret-number ${cls}">${text}</span>
    </div>`;
  }).join('') + `<div class="ret-item" style="margin-left:auto">
    <span class="ret-label">CIK</span>
    <span class="ret-number neutral" style="font-size:12px">${whale.cik || '—'}</span>
  </div>`;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentWhaleName = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchTab(tab) {
  currentTab = tab;
  ['holdings','new-buys','returns','theme'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  loadTabContent(tab);
}

async function loadTabContent(tab) {
  const content = document.getElementById('tabContent');
  content.innerHTML = '<div class="loading-state"><span class="spinner"></span>Loading…</div>';
  const name = currentWhaleName;
  if (!name) return;
  const esc = encodeURIComponent(name);

  try {
    if (tab === 'holdings') {
      const res = await fetch(`${API}/whales/${esc}/holdings`);
      const d = await res.json();
      const holdings = d.holdings || d || [];
      renderHoldings(holdings);
    } else if (tab === 'new-buys') {
      const res = await fetch(`${API}/whales/${esc}/new-buys`);
      const d = await res.json();
      renderNewBuys(d.transactions || []);
      const badge = document.getElementById('newBuysBadge');
      badge.textContent = d.count > 0 ? `(${d.count})` : '';
    } else if (tab === 'returns') {
      const res = await fetch(`${API}/whales/${esc}/returns`);
      const d = await res.json();
      renderReturnsHistory(d.quarterly_returns || []);
    } else if (tab === 'theme') {
      const whale = whales.find(w => w.name === name) || {};
      renderTheme(whale.ai_theme);
    }
  } catch(e) {
    content.innerHTML = `<div class="loading-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

function renderHoldings(holdings) {
  const content = document.getElementById('tabContent');
  if (!holdings.length) {
    content.innerHTML = '<div class="empty-state">No holdings data. Try refreshing this whale.</div>';
    return;
  }
  const maxW = Math.max(...holdings.map(h => h.weight_pct || 0));
  let html = `<table class="holdings-table">
    <thead><tr>
      <th>Ticker</th><th>Company</th>
      <th class="right">Shares</th><th class="right">Value</th>
      <th class="right" style="min-width:140px">Weight</th>
      <th>Quarter</th>
    </tr></thead><tbody>`;
  holdings.forEach(h => {
    const pct = (h.weight_pct || 0);
    const barW = maxW > 0 ? (pct / maxW * 100).toFixed(1) : 0;
    html += `<tr>
      <td class="td-ticker">${h.ticker}</td>
      <td>${h.company_name || '—'}</td>
      <td class="td-right">${h.shares ? Number(h.shares).toLocaleString() : '—'}</td>
      <td class="td-right">${fmtVal(h.value_usd)}</td>
      <td>
        <div class="weight-bar">
          <div class="weight-track"><div class="weight-fill" style="width:${barW}%"></div></div>
          <div class="weight-text">${pct.toFixed(1)}%</div>
        </div>
      </td>
      <td style="color:var(--text-dim)">${h.quarter || '—'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  content.innerHTML = html;
}

function renderNewBuys(txs) {
  const content = document.getElementById('tabContent');
  if (!txs.length) {
    content.innerHTML = '<div class="empty-state">No new buys detected this quarter.<br><span style="color:var(--text-dimmer);font-size:11px">New buys are detected by comparing this quarter\'s holdings against the previous quarter. Refresh the whale to detect new transactions.</span></div>';
    return;
  }
  let html = `<table class="holdings-table">
    <thead><tr>
      <th>Ticker</th><th>Company</th><th>Type</th>
      <th class="right">Shares</th><th class="right">Value</th>
      <th>Quarter</th>
    </tr></thead><tbody>`;
  txs.forEach(t => {
    const typeCls = t.transaction_type === 'NEW' ? 'tx-type-new' : 'tx-type-added';
    html += `<tr>
      <td class="td-ticker">${t.ticker}</td>
      <td>${t.company_name || '—'}</td>
      <td><span class="${typeCls}">${t.transaction_type}</span></td>
      <td class="td-right">${t.shares ? Number(t.shares).toLocaleString() : '—'}</td>
      <td class="td-right">${fmtVal(t.value_usd)}</td>
      <td style="color:var(--text-dim)">${t.quarter || '—'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  content.innerHTML = html;
}

function renderReturnsHistory(records) {
  const content = document.getElementById('tabContent');
  if (!records.length) {
    content.innerHTML = '<div class="empty-state">No returns history available yet.</div>';
    return;
  }
  const sorted = [...records].sort((a, b) => (b.quarter || '').localeCompare(a.quarter || ''));
  let html = '<div class="returns-tab-content">';
  sorted.forEach(r => {
    const ret = r.calculated_return_pct;
    const spy = r.benchmark_spy_return_pct;
    const { text, cls } = fmtRet(ret);
    const spyFmt = fmtRet(spy);
    const alpha = (ret != null && spy != null) ? (ret - spy) : null;
    const alphaFmt = fmtRet(alpha);
    html += `<div class="returns-card">
      <div class="returns-card-row">
        <span class="returns-card-quarter">${r.quarter || '—'}</span>
        <span class="returns-card-portfolio-val">${fmtVal(r.portfolio_value_usd)}</span>
      </div>
      <div class="returns-card-row" style="margin-top:6px">
        <span class="returns-card-val ${cls}">${text}</span>
        <div style="text-align:right">
          <div class="returns-card-spy">vs SPY: <span class="${spyFmt.cls}">${spyFmt.text}</span></div>
          <div class="returns-card-spy">Alpha: <span class="${alphaFmt.cls}">${alphaFmt.text}</span></div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

function renderTheme(theme) {
  const content = document.getElementById('tabContent');
  if (!theme) {
    content.innerHTML = '<div class="theme-content"><p class="theme-placeholder">No AI theme generated yet. Refresh this whale to generate one.</p></div>';
    return;
  }
  content.innerHTML = `<div class="theme-content"><p class="theme-text">${theme}</p></div>`;
}

async function triggerRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↺ Refreshing…';
  try {
    const res = await fetch(`${API}/whales/refresh`, { method: 'POST' });
    const d = await res.json();
    btn.textContent = `↺ ${d.status === 'already_running' ? 'Running…' : 'Started!'}`;
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '↺ Refresh All';
    }, 5000);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '↺ Refresh All';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadWhales();
</script>
</body>
</html>
